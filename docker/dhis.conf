connection.dialect = org.hibernate.dialect.PostgreSQLDialect
connection.driver_class = org.postgresql.Driver
connection.url = jdbc:postgresql://${DB_HOSTNAME}/${DB_NAME}
connection.username = ${DB_USERNAME}
connection.password = ${DB_PASSWORD}

tracker.import.preheat.cache.enabled=off

# This stack is served over plain HTTP on http://localhost:8080. With
# server.https = true DHIS2 flags the session cookie Secure, which browsers
# refuse to store over HTTP -> login silently bounces back to the login page.
# Set true only when DHIS2 sits behind an HTTPS reverse proxy.
server.https = false

route.remote_servers_allowed = http://*
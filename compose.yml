# Standalone DHIS2 stack (web + PostGIS db + one-shot dump loader).
#   docker compose up -d
# To also run chap-core alongside it, use the overlay that includes this file:
#   docker compose -f compose.chap.yml up -d
# Required environment variables: DB_USERNAME, DB_PASSWORD
# Optional: DHIS2_DB_DUMP_URL (defaults to the Laos 2.42 climate demo database)

services:
  web:
    image: dhis2/core:2.42.5
    volumes:
      - ./docker/log4j2.xml:/opt/dhis2/log4j2.xml:ro
      - ./docker/dhis.conf:/opt/dhis2/dhis.conf:ro
    environment:
      DB_HOSTNAME: ${DB_HOSTNAME:-db}
      DB_NAME: ${DB_NAME:-dhis}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      # Override DHIS2_PORT to coexist with another stack already on 8080.
      - "127.0.0.1:${DHIS2_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/dhis-web-login/index.html | grep -q 200"]
      interval: 30s
      timeout: 5s
      retries: 60
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: ghcr.io/baosystems/postgis:16-3.5
    volumes:
      - db-dump:/docker-entrypoint-initdb.d/
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_NAME:-dhis}
      POSTGRES_PASSWORD: &postgres_password ${DB_PASSWORD}
      PGPASSWORD: *postgres_password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'psql --no-password --quiet --username $$POSTGRES_USER postgres://127.0.0.1/$$POSTGRES_DB -p 5432 --command "SELECT ''ok''" > /dev/null',
        ]
      start_period: 120s
      interval: 1s
      timeout: 3s
      retries: 5
    depends_on:
      db-dump:
        condition: service_completed_successfully
    # Published on 127.0.0.1 so a SQL client (DBeaver, psql) can browse the DHIS2
    # data. High default port (15432) to avoid clashing with a local postgres on
    # 5432; override DHIS2_DB_PORT per stack. Drop the "127.0.0.1:" prefix to let
    # other machines on the network connect.
    ports:
      - "127.0.0.1:${DHIS2_DB_PORT:-15432}:5432"

  db-dump:
    image: alpine
    # Downloads the dump and rewrites it so it loads cleanly into a fresh DB.
    # See docker/prepare-dump.sh for the why.
    command: sh /opt/prepare-dump.sh
    environment:
      DHIS2_DB_DUMP_URL: "${DHIS2_DB_DUMP_URL:-https://databases.dhis2.org/climate/laos/2.42/laos.sql.gz}"
    working_dir: /opt/dump
    volumes:
      - db-dump:/opt/dump
      - ./docker/prepare-dump.sh:/opt/prepare-dump.sh:ro

  # One-shot: a freshly loaded dump has no populated analytics_* tables, so the
  # Data Visualizer / Climate app / CHAP Modelling App see no data until analytics
  # runs. This kicks off the analytics export, polls it to completion, then exits.
  analytics-trigger:
    image: alpine
    restart: on-failure
    command: sh /opt/trigger-analytics.sh
    environment:
      DHIS2_BASE_URL: "http://web:8080"
      DHIS2_ADMIN_USER: "${DHIS2_ADMIN_USER:-admin}"
      DHIS2_ADMIN_PASSWORD: "${DHIS2_ADMIN_PASSWORD:-district}"
    volumes:
      - ./docker/trigger-analytics.sh:/opt/trigger-analytics.sh:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  db-dump: {}

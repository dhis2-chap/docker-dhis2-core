# Standalone DHIS2 stack: dhis2-web + dhis2-db (PostGIS) + dump loader + job reset
# + analytics. All DHIS2 services are prefixed "dhis2-"; the chap overlay adds
# "chap-*" services (see compose.chap.yml).
#   make start            (or: docker compose up)
# To also run chap-core alongside it, use the overlay that includes this file:
#   make start-chap       (or: docker compose -f compose.chap.yml up)
# All values have working defaults; copy .env.example to .env only to change them.
# Optional: DHIS2_DB_DUMP_URL (defaults to the Laos 2.42 climate demo database)

services:
  dhis2-web:
    image: dhis2/core:2.42.5
    volumes:
      - ./docker/log4j2.xml:/opt/dhis2/log4j2.xml:ro
      - ./docker/dhis.conf:/opt/dhis2/dhis.conf:ro
    environment:
      DB_HOSTNAME: ${DB_HOSTNAME:-dhis2-db}
      DB_NAME: ${DB_NAME:-dhis}
      DB_USERNAME: ${DB_USERNAME:-dhis}
      DB_PASSWORD: ${DB_PASSWORD:-dhis}
    ports:
      # Override DHIS2_PORT to coexist with another stack already on 8080.
      - "127.0.0.1:${DHIS2_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/dhis-web-login/index.html | grep -q 200"]
      interval: 30s
      timeout: 5s
      retries: 60
      start_period: 120s
    depends_on:
      dhis2-db:
        condition: service_healthy
      dhis2-db-prep:
        condition: service_completed_successfully

  dhis2-db:
    image: ghcr.io/baosystems/postgis:16-3.5
    volumes:
      - dhis2-db-dump:/docker-entrypoint-initdb.d/
    environment:
      POSTGRES_USER: ${DB_USERNAME:-dhis}
      POSTGRES_DB: ${DB_NAME:-dhis}
      POSTGRES_PASSWORD: &postgres_password ${DB_PASSWORD:-dhis}
      PGPASSWORD: *postgres_password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'psql --no-password --quiet --username $$POSTGRES_USER postgres://127.0.0.1/$$POSTGRES_DB -p 5432 --command "SELECT ''ok''" > /dev/null',
        ]
      start_period: 120s
      interval: 1s
      timeout: 3s
      retries: 5
    depends_on:
      dhis2-db-dump:
        condition: service_completed_successfully
    # Published on 127.0.0.1 so a SQL client (DBeaver, psql) can browse the DHIS2
    # data. High default port (15432) to avoid clashing with a local postgres on
    # 5432; override DHIS2_DB_PORT per stack. Drop the "127.0.0.1:" prefix to let
    # other machines on the network connect.
    ports:
      - "127.0.0.1:${DHIS2_DB_PORT:-15432}:5432"

  dhis2-db-dump:
    image: alpine
    # Downloads the dump and rewrites it so it loads cleanly into a fresh DB.
    # See docker/prepare-dump.sh for the why.
    command: sh /opt/prepare-dump.sh
    environment:
      DHIS2_DB_DUMP_URL: "${DHIS2_DB_DUMP_URL:-https://databases.dhis2.org/climate/laos/2.42/laos.sql.gz}"
    working_dir: /opt/dump
    volumes:
      - dhis2-db-dump:/opt/dump
      - ./docker/prepare-dump.sh:/opt/prepare-dump.sh:ro

  # One-shot DB prep that runs after the dump loads and before DHIS2 boots, on
  # every start (start / start-chap / *-force). Two jobs:
  #   1. ANALYZE — a freshly restored dump has NO planner statistics, so the
  #      analytics aggregations get terrible query plans (the first analytics run
  #      took ~20 MINUTES). A 1-second ANALYZE fixes the stats and brings analytics
  #      down to ~20s. (Postgres autovacuum would eventually do this, but not before
  #      the analytics trigger fires.)
  #   2. Reset any job left flagged RUNNING by a previous hard stop (e.g. a Ctrl+C
  #      mid-analytics) — DHIS2 won't start a new analytics run while one is RUNNING,
  #      so a stale job would otherwise block it forever.
  # ON_ERROR_STOP=0 so a not-yet-migrated DB (no jobconfiguration table) is a no-op.
  dhis2-db-prep:
    image: ghcr.io/baosystems/postgis:16-3.5
    environment:
      PGHOST: ${DB_HOSTNAME:-dhis2-db}
      PGUSER: ${DB_USERNAME:-dhis}
      PGPASSWORD: ${DB_PASSWORD:-dhis}
      PGDATABASE: ${DB_NAME:-dhis}
    entrypoint: ["psql"]
    command:
      - "-v"
      - "ON_ERROR_STOP=0"
      - "-c"
      - "UPDATE jobconfiguration SET jobstatus='SCHEDULED' WHERE jobstatus='RUNNING';"
      - "-c"
      - "ANALYZE;"
    depends_on:
      dhis2-db:
        condition: service_healthy

  # One-shot: a freshly loaded dump has no populated analytics_* tables, so the
  # Data Visualizer / Climate app / CHAP Modelling App see no data until analytics
  # runs. This kicks off the analytics export, polls it to completion, then exits.
  dhis2-analytics:
    image: alpine
    restart: on-failure
    command: sh /opt/trigger-analytics.sh
    environment:
      DHIS2_ANALYTICS: "${DHIS2_ANALYTICS:-1}" # set 0 to skip analytics generation
      DHIS2_BASE_URL: "http://dhis2-web:8080"
      DHIS2_ADMIN_USER: "${DHIS2_ADMIN_USER:-admin}"
      DHIS2_ADMIN_PASSWORD: "${DHIS2_ADMIN_PASSWORD:-district}"
    volumes:
      - ./docker/trigger-analytics.sh:/opt/trigger-analytics.sh:ro
    depends_on:
      dhis2-web:
        condition: service_healthy

volumes:
  dhis2-db-dump: {}

# DHIS2 + chap-core (v2.0.0) overlay.
#
# This file `include`s the standalone DHIS2 stack (compose.yml) and adds the
# chap-core services, a chapkit model (EWARS), and a one-shot that registers a
# DHIS2 Route pointing at chap. Bring up the whole thing with:
#
#   docker compose -f compose.chap.yml up -d
#
# (Plain `docker compose up -d` still runs DHIS2 only, via compose.yml.)
#
# chap-core has no authentication, so its port is only exposed on the host for
# local inspection; DHIS2 reaches it internally at http://chap:8000 through the
# auto-created Route (code "chap").

include:
  - compose.yml

services:
  # ----- chap-core API -----
  chap:
    image: ghcr.io/dhis2-chap/chap-core:v2.0.0
    platform: linux/amd64
    # No container_name: the service name "chap" is already a network alias on the
    # compose network, so the DHIS2 Route target http://chap:8000 resolves without
    # claiming a global container name that could collide with other stacks.
    environment:
      REDIS_HOST: chap-redis
      REDIS_PORT: 6379
      CHAP_DATABASE_URL: postgresql://${POSTGRES_USER:-chap}:${POSTGRES_PASSWORD:-chap}@chap-postgres:5432/${POSTGRES_DB:-chap_core}
      CELERY_BROKER: redis://chap-redis:6379/0
      CHAP_LOGS_DIR: /data/logs
      CHAP_RUNS_DIR: /data/runs
      # FastAPI root_path so the proxied Swagger UI / OpenAPI work behind the DHIS2
      # route: chap is reached at /api/routes/chap/run/** (e.g. .../run/docs), so it
      # must advertise that prefix when generating /docs and openapi.json URLs.
      CHAP_ROOT_PATH: ${CHAP_ROOT_PATH:-/api/routes/chap/run}
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: chap:chap
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 2000000000 # 2GB for runtime temp files (API service)
      - type: volume
        source: chap-logs
        target: /data/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Internal only: DHIS2 reaches chap over the compose network via the "chap"
    # route, and chap-core has no auth, so it is not published to the host. For
    # ad-hoc debugging use `docker compose -f compose.chap.yml exec chap ...`.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      chap-redis:
        condition: service_started
      chap-worker:
        condition: service_started
      chap-postgres:
        condition: service_healthy

  # ----- chap-core Celery worker (runs the models; INLA/R baked into the image) -----
  chap-worker:
    image: ghcr.io/dhis2-chap/chap-worker:v2.0.0
    platform: linux/amd64
    command: "/app/.venv/bin/celery -A chap_core.rest_api.celery_tasks worker --loglevel=info"
    working_dir: /app
    environment:
      IS_IN_DOCKER: 1
      REDIS_HOST: chap-redis
      REDIS_PORT: 6379
      CHAP_DATABASE_URL: postgresql://${POSTGRES_USER:-chap}:${POSTGRES_PASSWORD:-chap}@chap-postgres:5432/${POSTGRES_DB:-chap_core}
      CELERY_BROKER: redis://chap-redis:6379
      RENV_PATHS_ROOT: /data/renv
      UV_CACHE_DIR: /data/uv
      CHAP_LOGS_DIR: /data/logs
      CHAP_RUNS_DIR: /data/runs
      PYTENSOR_FLAGS: "base_compiledir=/data/pytensor"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: chap:chap
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 2000000000 # 2GB for runtime temp files (model execution)
      - type: volume
        source: chap-runs
        target: /data/runs
      - type: volume
        source: chap-renv
        target: /data/renv
      - type: volume
        source: chap-uv
        target: /data/uv
      - type: volume
        source: chap-logs
        target: /data/logs
      - type: volume
        source: chap-pytensor
        target: /data/pytensor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/celery -A chap_core.rest_api.celery_tasks inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      chap-postgres:
        condition: service_healthy

  # ----- chap-core message broker -----
  chap-redis:
    image: valkey/valkey:8

  # ----- chap-core database (internal only) -----
  chap-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chap}
      POSTGRES_DB: ${POSTGRES_DB:-chap_core}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chap} -d ${POSTGRES_DB:-chap_core}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - chap-db:/var/lib/postgresql/data
    # Published on 127.0.0.1 so a SQL client (DBeaver, psql) can browse the chap
    # data. High default port (15433) to avoid clashes; override CHAP_DB_PORT per
    # stack. Drop the "127.0.0.1:" prefix to let other machines connect.
    ports:
      - "127.0.0.1:${CHAP_DB_PORT:-15433}:5432"

  # ----- one-shot: register the DHIS2 Route that proxies DHIS2 -> chap -----
  chap-route-init:
    image: alpine
    restart: "no"
    command: sh /opt/create-chap-route.sh
    environment:
      DHIS2_BASE_URL: "http://dhis2-web:8080"
      DHIS2_ADMIN_USER: "${DHIS2_ADMIN_USER:-admin}"
      DHIS2_ADMIN_PASSWORD: "${DHIS2_ADMIN_PASSWORD:-district}"
      CHAP_ROUTE_URL: "http://chap:8000/**"
    volumes:
      - ./docker/create-chap-route.sh:/opt/create-chap-route.sh:ro
    depends_on:
      dhis2-web:
        condition: service_healthy
      chap:
        condition: service_healthy

  # ----- chapkit model: EWARS -----
  # Representative chapkit model service. It self-registers with chap-core on
  # start via the orchestrator URL below. Add more chapkit models the same way.
  chap-ewars:
    # Pinned by digest for a reproducible v2.0.0 stack (the upstream tag is a
    # moving :latest). This is chapkit_ewars_model:latest as of 2026-06-08.
    image: ghcr.io/chap-models/chapkit_ewars_model@sha256:7839f1e10f242af7c46d3f524ed7fd0f30d98ee4fa14f78f8491e110c4b61856
    platform: linux/amd64
    # Internal only: it talks to chap-core over the compose network.
    expose:
      - "8000"
    environment:
      # $$ -> literal $ ; chapkit reads "$register" as the self-registration path.
      SERVICEKIT_ORCHESTRATOR_URL: http://chap:8000/v2/services/$$register
    depends_on:
      chap:
        condition: service_healthy

volumes:
  chap-db: {}
  chap-logs: {}
  chap-renv: {}
  chap-uv: {}
  chap-pytensor: {}
  chap-runs: {}
